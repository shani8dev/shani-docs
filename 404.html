<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shanios Docs</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <script>
    // GitHub Pages SPA redirect — rewrite 404 paths back to index.html
    // preserving the path, query string, and hash so the SPA router can restore them.
    (function () {
      var l = window.location;
      var path   = l.pathname;
      var search = l.search ? l.search.slice(1) : '';
      var hash   = l.hash   ? l.hash.slice(1)   : '';
      // Normalise legacy /docs/<slug> → /doc/<slug>
      var docMatch = path.match(/^\/docs\/(.+?)(?:\.md)?\/?$/);
      if (docMatch) path = '/doc/' + docMatch[1];
      var redirect = l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') + '/' +
        '?p=' + encodeURIComponent(path) +
        (search ? '&q=' + encodeURIComponent(search) : '') +
        (hash   ? '&h=' + encodeURIComponent(hash)   : '');
      l.replace(redirect);
    })();
  </script>
  <script>
    (function () {
      // Prefix must match CONFIG.STORAGE_PREFIX + '_' used in script-docs.js
      var pfx = (typeof CONFIG !== 'undefined' && CONFIG.STORAGE_PREFIX)
                  ? CONFIG.STORAGE_PREFIX + '_'
                  : 'shanidocs_';
      var t = localStorage.getItem(pfx + 'theme') ||
              (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <noscript>
    <div style="text-align:center;padding:4rem 2rem;font-family:sans-serif">
      <strong>JavaScript is required to view this wiki.</strong>
    </div>
  </noscript>
</body>
</html>
