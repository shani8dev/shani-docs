<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shanios Docs</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <script>
    // GitHub Pages SPA redirect — rewrite 404 paths back to index.html
    // preserving the path so the SPA router (/doc/<slug>) can handle it.
    (function () {
      var l = window.location;
      var path = l.pathname;
      // Normalise legacy /docs/<slug> → /doc/<slug>
      var docMatch = path.match(/^\/docs\/(.+?)(?:\.md)?$/);
      if (docMatch) path = '/doc/' + docMatch[1];
      // Redirect to root, passing the intended path as a query param
      // so index.html can restore it with history.replaceState.
      var redirect = l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(path) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '');
      l.replace(redirect);
    })();
  </script>
  <script>
    (function () {
      var pfx = 'shanidocs_';
      var t = localStorage.getItem(pfx + 'theme') ||
              (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <noscript>
    <div style="text-align:center;padding:4rem 2rem;font-family:sans-serif">
      <strong>JavaScript is required to view this wiki.</strong>
    </div>
  </noscript>
</body>
</html>
